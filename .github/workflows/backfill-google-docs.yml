name: Backfill Archive To Google Docs

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Optional number of posts/drafts to backfill for a test run. Use 0 for all."
        required: true
        default: "3"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Backfill archive to Google Docs
        run: npm run backfill:docs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_AUTH_MODE: oauth
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_PUBLISH_FOLDER_ID: ${{ secrets.GOOGLE_PUBLISH_FOLDER_ID }}
          GOOGLE_DRAFTS_FOLDER_ID: ${{ secrets.GOOGLE_DRAFTS_FOLDER_ID }}
          GOOGLE_EDITOR_EMAIL: ${{ secrets.GOOGLE_EDITOR_EMAIL }}
          BACKFILL_LIMIT: ${{ inputs.limit }}

      - name: Build
        run: npm run build

      - name: Commit Google Docs mapping
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No mapping changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog public/images/docs
          git commit -m "Backfill archive to Google Docs"
          git push

name: Sync Google Docs

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Google Docs
        run: npm run sync:docs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PUBLISH_FOLDER_ID: ${{ secrets.GOOGLE_PUBLISH_FOLDER_ID }}

      - name: Build
        run: npm run build

      - name: Commit synced content
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No content changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog public/images/docs
          git commit -m "Sync Google Docs content"
          git push

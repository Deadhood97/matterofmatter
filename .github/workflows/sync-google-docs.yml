name: Sync Google Docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync Google Docs
        run: npm run sync:docs
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PUBLISH_FOLDER_ID: ${{ secrets.GOOGLE_PUBLISH_FOLDER_ID }}

      - name: Build
        run: npm run build

      - name: Commit synced content
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No content changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog public/images/docs
          git commit -m "Sync Google Docs content"
          git push

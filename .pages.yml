media:
  input: public/images/blogger
  output: /images/blogger

content:
  - name: posts
    label: Posts
    type: collection
    path: src/content/blog
    filename: '{year}/{month}/{primary}.md'
    view:
      fields: [title, published, status]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: published
        label: Published
        type: date
        options:
          time: true
        required: true
      - name: updated
        label: Updated
        type: date
        options:
          time: true
      - name: author
        label: Author
        type: string
        default: ddHd
      - name: status
        label: Status
        type: select
        options:
          values: [LIVE, DRAFT]
        default: LIVE
      - name: bloggerPath
        label: Blogger Path
        type: string
        required: true
      - name: labels
        label: Labels
        type: string
        list: true
      - name: description
        label: Description
        type: text
      - name: body
        label: Body
        type: rich-text
